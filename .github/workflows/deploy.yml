name: Deploy Full Cloud Resume Project

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - uses: actions/checkout@v3

      # -----------------------------
      # BACKEND DEPLOYMENT (ZIP)
      # -----------------------------
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          cd api/CloudResumeAPI
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Deploy Azure Function (ZIP)
        uses: azure/CLI@v1
        with:
          azcliversion: 2.46.0
          inlineScript: |
            cd api/CloudResumeAPI
            zip -r function.zip .
            az functionapp deployment source config-zip \
              --name ${{ secrets.AZURE_FUNCTIONAPP_NAME }} \
              --resource-group cloud-resume-rg \
              --src function.zip \
              --verbose

      # -----------------------------
      # FRONTEND DEPLOYMENT
      # -----------------------------
      - name: Upload frontend to Azure Storage
        uses: azure/CLI@v1
        with:
          azcliversion: 2.46.0
          inlineScript: |
            az storage blob upload-batch \
              --connection-string ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }} \
              --destination '$web' \
              --source ./frontend
