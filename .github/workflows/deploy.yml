name: Deploy Frontend to Azure

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Upload frontend to Azure Storage
      uses: azure/CLI@v1
      with:
        azcliversion: 2.46.0
        inlineScript: |
          az storage blob upload-batch \
            --connection-string ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }} \
            --destination '$web'\
            --source ./frontend
