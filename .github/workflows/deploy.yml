name: Deploy Frontend to Azure

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out repository
      - uses: actions/checkout@v3

      # Step 2: List frontend folder (optional, debugging)
      - name: List frontend folder
        run: |
          echo "Listing frontend folder contents..."
          ls -la ./frontend

      # Step 3: Upload frontend using Azure CLI
      - name: Upload frontend to Azure Storage
        uses: azure/CLI@v1
        with:
          azcliversion: 2.46.0
          inlineScript: |
            echo "Uploading frontend files..."
            az storage blob upload-batch \
              --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              --destination \$web \
              --source ./frontend \
              --overwrite
