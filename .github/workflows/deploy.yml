name: Deploy Frontend to Azure

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your repository
      - uses: actions/checkout@v3

      # Step 2: Verify frontend folder exists (optional, for debugging)
      - name: List frontend folder
        run: |
          echo "Listing frontend folder contents..."
          ls -la ./frontend

      # Step 3: Upload frontend to Azure Storage
      - name: Upload static site to Azure Storage
        uses: azure/storage-blob-upload@v1
        with:
          connection-string: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          container-name: '$web'
          source: './frontend'
