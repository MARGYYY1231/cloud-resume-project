<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Margaret Gonzales | Cloud Resume</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- NAV BAR -->
    <nav class="nav-bar">
        <a href="index.html">Home</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main class="container">

        <!-- HEADER -->
        <header>
            <h1>Contact Form</h1>
            <button id="theme-toggle" aria-label="Toggle light and dark mode">☀️ Light Mode</button>
        </header>

        <!-- FORM -->
        <form id="contact-form" class="contact-form" aria-label="Contact form">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Your name" required />
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Your email" required />
            </div>
            <div class="form-group">
                <label for="message">Message:</label>
                <textarea id="message" name="message" placeholder="Your message" required></textarea>
            </div>
            <button type="submit">Send Message</button>
            <p id="form-response" role="status" aria-live="polite"></p>
        </form>

<p id="response"></p>
    </main>
    <canvas id="particles"></canvas>
    <div class="cursor-glow"></div>
    <script src="script.js"></script>
</body>
</html>
